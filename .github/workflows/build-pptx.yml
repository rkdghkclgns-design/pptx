name: Build PPTX Presentation

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: "Supabase session UUID"
        required: true
        type: string
      settings:
        description: "JSON settings string"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: builder/requirements.txt

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-nanum-coding fonts-nanum-extra

      - name: Install Python dependencies
        run: pip install -r builder/requirements.txt

      - name: Run PPT builder
        working-directory: builder
        env:
          SESSION_ID: ${{ github.event.inputs.session_id }}
          SETTINGS: ${{ github.event.inputs.settings }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload PPTX artifact
        uses: actions/upload-artifact@v4
        with:
          name: presentation-${{ github.event.inputs.session_id }}
          path: builder/output/presentation.pptx
          retention-days: 7

      - name: Update session status (final)
        if: always()
        working-directory: builder
        env:
          SESSION_ID: ${{ github.event.inputs.session_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUILD_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: python update_status.py
